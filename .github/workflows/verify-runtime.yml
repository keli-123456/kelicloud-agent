name: Verify Runtime

on:
  workflow_dispatch:

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run test suite
        run: GOCACHE=$PWD/.gocache GOMODCACHE=$PWD/.gomodcache go test ./...

      - name: Build verification binary
        env:
          CGO_ENABLED: 0
          VERSION: verify
        run: go build -trimpath -ldflags="-s -w -X github.com/komari-monitor/komari-agent/update.CurrentVersion=${VERSION}" -o kelicloud-agent .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kelicloud-agent-linux-amd64-verify
          path: kelicloud-agent
